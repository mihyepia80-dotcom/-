<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026학년도 학교 중간평가</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>2026학년도 학교 중간평가</h1>
      <p class="subtitle">행사 마스터 · 학년 협의록 · 교과/비교과 · 부서별 협의록</p>
      <p id="cloud-status" class="cloud-status" data-state="warn">클라우드: 확인 중…</p>
      <p class="header-admin-link no-print">
        <a href="admin.html" class="admin-link-btn">관리자 대시보드</a>
      </p>
    </div>
  </header>

  <nav class="tab-nav main-nav" role="tablist">
    <button class="tab-btn active" data-tab="form5" role="tab" aria-selected="true">
      <span class="tab-num">1</span><span class="tab-label">행사 마스터</span>
    </button>
    <button class="tab-btn" data-tab="form-grade" role="tab" aria-selected="false">
      <span class="tab-num">2</span><span class="tab-label">학년 협의록</span>
    </button>
    <button class="tab-btn" data-tab="form4" role="tab" aria-selected="false">
      <span class="tab-num">3</span><span class="tab-label">교과/비교과</span>
    </button>
    <button class="tab-btn" data-tab="form6" role="tab" aria-selected="false">
      <span class="tab-num">4</span><span class="tab-label">부서 협의록</span>
    </button>
  </nav>

  <main class="main-content">

    <!-- 1) 행사 마스터 · 행사 평가 (Form5.init에서 렌더) -->
    <section id="form5" class="form-panel active" role="tabpanel"></section>

    <section id="form-grade" class="form-panel" role="tabpanel" hidden></section>
    <section id="form4" class="form-panel" role="tabpanel" hidden></section>
    <section id="form6" class="form-panel" role="tabpanel" hidden></section>

  </main>

  <footer class="site-footer no-print">
    <p>로컬: <code>npm run dev</code> · 클라우드 제출(Firebase) · Excel
      <a href="admin.html" class="admin-link">관리자 대시보드</a>
    </p>
  </footer>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>window.__ENV__ = window.__ENV__ || {};</script>
  <script src="js/env.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/master.js"></script>
  <script src="js/master-view.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/form6-data.js"></script>
  <script src="js/excel.js"></script>
  <script src="js/form-grade.js"></script>
  <script src="js/form4.js"></script>
  <script src="js/form5.js"></script>
  <script src="js/form6.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
